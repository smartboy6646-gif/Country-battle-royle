<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marble Race - Tournament Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js">
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0c0d14 0%, #05050b 100%);
            display: flex; justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw; overflow: hidden;
            font-family: 'Poppins', sans-serif; touch-action: none;
        }
        canvas { max-width: 100%; max-height: 100%; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #picker-overlay { display: none; position: fixed; inset: 0; background: rgba(8,9,15,0.96); z-index: 1000; flex-direction: column; align-items: center; backdrop-filter: blur(10px); }
        #picker-overlay.show { display: flex; }
        #picker-header { width: 100%; max-width: 540px; background: linear-gradient(135deg, #0d0e1a, #120b29); padding: 16px 14px 10px; border-bottom: 2px solid #B026FF; flex-shrink: 0; box-shadow: 0 4px 15px rgba(176,38,255,0.3); }
        #picker-title { color: #00F3FF; font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 900; text-align: center; text-shadow: 0 0 10px rgba(0,243,255,0.5); letter-spacing: 1px; }
        #picker-count { color: #FFF; font-size: 14px; text-align: center; margin: 5px 0 12px; font-weight: 600; }
        #picker-btns { display: flex; gap: 8px; justify-content: center; }
        #picker-btns button { padding: 10px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 800; cursor: pointer; transition: all .2s; font-family: 'Poppins', sans-serif; text-transform: uppercase; }
        #btn-auto { background: linear-gradient(135deg, #B026FF, #7000FF); color: #fff; box-shadow: 0 4px 10px rgba(176,38,255,0.4); }
        #btn-clear { background: #2A2A3A; color: #fff; border: 1px solid #444; }
        #btn-start { background: linear-gradient(135deg, #00FF55, #00B33C); color: #000; box-shadow: 0 4px 10px rgba(0,255,85,0.4); }
        #btn-start:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; }
        #picker-search { width: 100%; max-width: 540px; padding: 12px; background: #07080f; flex-shrink: 0; border-bottom: 1px solid #1a1b26; }
        #picker-search input { width: 100%; padding: 10px 15px; background: #121324; border: 1px solid #B026FF; border-radius: 8px; color: #fff; font-size: 14px; outline: none; font-family: 'Poppins', sans-serif; }
        #picker-search input:focus { box-shadow: 0 0 10px rgba(176,38,255,0.5); }
        #picker-grid { width: 100%; max-width: 540px; overflow-y: auto; flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; }
        .cc { background: rgba(18,19,35,0.7); border: 1px solid #2a2b40; border-radius: 12px; display: flex; flex-direction: column; align-items: center; padding: 10px 5px; cursor: pointer; transition: all .2s; user-select: none; -webkit-tap-highlight-color: transparent; position: relative; backdrop-filter: blur(5px); }
        .cc:active { transform: scale(0.92); }
        .cc.sel { background: rgba(112,0,255,0.2); border-color: #00F3FF; box-shadow: 0 0 12px rgba(0,243,255,0.4); }
        .cc img { width: 44px; height: 30px; object-fit: cover; border-radius: 4px; border: 1px solid #555; }
        .cc .cn { color: #E0E0E0; font-size: 10px; font-weight: 600; text-align: center; margin-top: 6px; line-height: 1.2; }
        .cc.sel .cn { color: #00F3FF; }
        .cc .bdg { position: absolute; top: -5px; right: -5px; background: #FFD700; color: #000; font-size: 11px; font-weight: 800; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        #kill-feed-container {
            position: absolute; left: 0; transform-origin: top left;
            width: 210px; pointer-events: none; z-index: 2000; display: none;
            font-family: 'Poppins', sans-serif;
        }
        #kill-feed-container .title { margin-bottom: 6px; color: #FF0055; font-size: 13px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); display: flex; align-items: center; }
        #kill-feed-container .title::before { content: '⚡'; margin-right: 4px; }
        .feed-item {
            background: linear-gradient(90deg, rgba(12,13,24,0.95), rgba(20,21,38,0.7));
            border-left: 3px solid #00F3FF; margin-bottom: 5px; padding: 5px 8px;
            display: flex; align-items: center; color: #FFF; font-size: 11px; font-weight: 600;
            border-radius: 0 6px 6px 0; backdrop-filter: blur(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            animation: slideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .feed-item.ring-death { border-left-color: #FF0055; color: #FF6688; }
        .feed-item img { width: 18px; height: 12px; margin: 0 5px; border-radius: 2px; object-fit: cover; }
        .gun-flipped { display: inline-block; transform: scaleX(-1); margin: 0 4px; font-size: 13px; filter: drop-shadow(0 0 2px rgba(255,255,255,0.5)); }

        @keyframes slideIn {
            0% { transform: translateX(-30px) scale(0.8); opacity: 0; }
            60% { transform: translateX(5px) scale(1.02); opacity: 1; }
            100% { transform: translateX(0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="picker-overlay">
        <div id="picker-header">
            <div id="picker-title">WORLD CUP BATTLE ROYALE</div>
            <div id="picker-count">SELECTED TEAMS: <span id="sel-count">0</span> / 16</div>
            <div id="picker-btns">
                <button id="btn-auto">🎲 AUTO DRAFT</button>
                <button id="btn-clear">✕ CLEAR</button>
                <button id="btn-start" disabled>▶ START TOURNAMENT</button>
            </div>
        </div>
        <div id="picker-search"><input type="text" id="search-input" placeholder="🔍 Search country..."></div>
        <div id="picker-grid"></div>
    </div>

    <div id="kill-feed-container">
        <div class="title">LIVE COMBAT LOG</div>
        <div id="kill-feed-list"></div>
    </div>

    <script>
        // GLOBAL CONFIGURATION SYSTEM
        const CONFIG = {
            tiktokId: '@Sunshine20775'
        };

        // SYNC HTML OVERLAY
        function syncHTMLUI() {
            const canvas = document.querySelector('canvas');
            const feed = document.getElementById('kill-feed-container');
            if (canvas && feed && feed.style.display !== 'none') {
                const rect = canvas.getBoundingClientRect();
                const scale = rect.width / 540;
                feed.style.left = (rect.left + 12 * scale) + 'px';
                feed.style.top = (rect.top + 765 * scale) + 'px';
                feed.style.transform = `scale(${scale})`;
            }
            requestAnimationFrame(syncHTMLUI);
        }
        syncHTMLUI();

        const rawData = "AF:Afghanistan,AL:Albania,DZ:Algeria,AD:Andorra,AO:Angola,AR:Argentina,AM:Armenia,AU:Australia,AT:Austria,AZ:Azerbaijan,BS:Bahamas,BH:Bahrain,BD:Bangladesh,BB:Barbados,BY:Belarus,BE:Belgium,BZ:Belize,BJ:Benin,BT:Bhutan,BO:Bolivia,BA:Bosnia,BW:Botswana,BR:Brazil,BN:Brunei,BG:Bulgaria,BF:Burkina Faso,BI:Burundi,CV:Cabo Verde,KH:Cambodia,CM:Cameroon,CA:Canada,CF:Central African Rep,TD:Chad,CL:Chile,CN:China,CO:Colombia,KM:Comoros,CG:Congo,CR:Costa Rica,HR:Croatia,CU:Cuba,CY:Cyprus,CZ:Czechia,DK:Denmark,DJ:Djibouti,DM:Dominica,DO:Dominican Rep,EC:Ecuador,EG:Egypt,SV:El Salvador,GQ:Equatorial Guinea,ER:Eritrea,EE:Estonia,SZ:Eswatini,ET:Ethiopia,FJ:Fiji,FI:Finland,FR:France,GA:Gabon,GM:Gambia,GE:Georgia,DE:Germany,GH:Ghana,GR:Greece,GD:Grenada,GT:Guatemala,GN:Guinea,GW:Guinea-Bissau,GY:Guyana,HT:Haiti,HN:Honduras,HU:Hungary,IS:Iceland,IN:India,ID:Indonesia,IR:Iran,IQ:Iraq,IE:Ireland,IL:Israel,IT:Italy,JM:Jamaica,JP:Japan,JO:Jordan,KZ:Kazakhstan,KE:Kenya,KI:Kiribati,KP:North Korea,KR:South Korea,KW:Kuwait,KG:Kyrgyzstan,LA:Laos,LV:Latvia,LB:Lebanon,LS:Lesotho,LR:Liberia,LY:Libya,LI:Liechtenstein,LT:Lithuania,LU:Luxembourg,MG:Madagascar,MW:Malawi,MY:Malaysia,MV:Maldives,ML:Mali,MT:Malta,MH:Marshall Islands,MR:Mauritania,MU:Marshall Islands,MX:Mexico,FM:Micronesia,MD:Moldova,MC:Monaco,MN:Mongolia,ME:Montenegro,MA:Morocco,MZ:Mozambique,MM:Myanmar,NA:Namibia,NR:Nauru,NP:Nepal,NL:Netherlands,NZ:New Zealand,NI:Nicaragua,NE:Niger,NG:Nigeria,MK:North Macedonia,NO:Norway,OM:Oman,PK:Pakistan,PW:Palau,PA:Panama,PG:Papua New Guinea,PY:Paraguay,PE:Peru,PH:Philippines,PL:Poland,PT:Portugal,QA:Qatar,RO:Romania,RU:Russia,RW:Rwanda,KN:St Kitts,LC:St Lucia,VC:St Vincent,WS:Samoa,SM:San Marino,ST:Sao Tome,SA:Saudi Arabia,SN:Senegal,RS:Serbia,SC:Seychelles,SL:Sierra Leone,SG:Singapore,SK:Slovakia,SI:Slovenia,SB:Solomon Islands,SO:Somalia,ZA:South Africa,SS:South Sudan,ES:Spain,LK:Sri Lanka,SD:Sudan,SR:Suriname,SE:Sweden,CH:Switzerland,SY:Syria,TJ:Tajikistan,TZ:Tanzania,TH:Thailand,TL:Timor-Leste,TG:Togo,TO:Tonga,TT:Trinidad,TN:Tunisia,TR:Turkey,TM:Turkmenistan,TV:Tuvalu,UG:Uganda,UA:Ukraine,AE:UAE,GB:UK,US:USA,UY:Uruguay,UZ:Uzbekistan,VU:Vanuatu,VE:Venezuela,VN:Vietnam,YE:Yemen,ZM:Zambia,ZW:Zimbabwe";
        const allCountries = rawData.split(',').map(s => { let p = s.split(':'); return { code: p[0], name: p[1] }; });

        function getUniqueCountryPool(desiredCount) {
            const uniquePool = []; const usedCodes = new Set(); const shuffledMaster = shuffleArr([...allCountries]);
            for (let c of shuffledMaster) { if (uniquePool.length >= desiredCount) break; if (!usedCodes.has(c.code)) { usedCodes.add(c.code); uniquePool.push(c); } }
            return uniquePool.slice(0, desiredCount);
        }

        let gameState = {
            activeRoster: [], eliminatedNames: [], mode: 'normal', brCountries: [], brScores: {}, brPrevScores: {},
            brRound: 0, maxBrRounds: 6, prevRankMap: {}, wins: {}, roundHistory: [], roundStats: [],
            lastRoundKP: {}, lastRoundPP: {}, tourneyPhase: 0, tourneyGroups: [], currentGroupIdx: 0,
            tourneyAdvancing: [], wildcards: [], midMatch: null, showMatchReport: false, grandFinalEarlyWinner: null,
            globalStats: { kills: {}, wins: {}, placementPts: {}, lastRank: {} }, seasons: [], seasonSaved: false,
            placementCounts: {}
        };

        // UPDATED GLOBAL SORT: Points -> Placement Points -> Kills -> Best placement distribution (most 1st, 2nd...)
        function globalSort(a, b) {
            let ptsA = gameState.brScores[a.code] || 0;
            let ptsB = gameState.brScores[b.code] || 0;
            if (ptsB !== ptsA) return ptsB - ptsA;

            // Total placement points
            let pA = (gameState.globalStats && gameState.globalStats.placementPts) ? (gameState.globalStats.placementPts[a.code] || 0) : 0;
            let pB = (gameState.globalStats && gameState.globalStats.placementPts) ? (gameState.globalStats.placementPts[b.code] || 0) : 0;
            if (pB !== pA) return pB - pA;

            // Total kills
            let kA = (gameState.globalStats && gameState.globalStats.kills) ? (gameState.globalStats.kills[a.code] || 0) : 0;
            let kB = (gameState.globalStats && gameState.globalStats.kills) ? (gameState.globalStats.kills[b.code] || 0) : 0;
            if (kB !== kA) return kB - kA;

            // Placement distribution: most 1st places, then 2nd places, etc.
            let countsA = gameState.placementCounts[a.code] || new Array(17).fill(0);
            let countsB = gameState.placementCounts[b.code] || new Array(17).fill(0);
            for (let place = 1; place <= 16; place++) {
                if (countsB[place] !== countsA[place]) return countsB[place] - countsA[place];
            }

            return a.name.localeCompare(b.name);
        }

        function saveGameState() { localStorage.setItem('marbleRaceSave', JSON.stringify(gameState)); }
        function shuffleArr(a) { let b = [...a]; for (let i = b.length - 1; i > 0; i--) { let j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }

        // ARENA BACKGROUND WITH GRID & STARS
        function createArenaBackground(scene) {
            let g = scene.add.graphics();
            g.fillGradientStyle(0x0a0a1a, 0x0a0a1a, 0x14142e, 0x14142e, 1);
            g.fillRect(0, 0, 540, 960);
            g.lineStyle(1, 0x222244, 0.3);
            for (let i = 0; i < 540; i += 40) { g.moveTo(i, 0); g.lineTo(i, 960); }
            for (let j = 0; j < 960; j += 40) { g.moveTo(0, j); g.lineTo(540, j); }
            g.strokePath();
            g.fillStyle(0xFFFFFF, 0.2);
            for (let s = 0; s < 80; s++) {
                g.fillCircle(Math.random() * 540, Math.random() * 960, 1.5);
            }
            g.setDepth(0);
        }

        function buildGrid(f = '') {
            const g = document.getElementById('picker-grid'); g.innerHTML = '';
            allCountries.filter(c => c.name.toLowerCase().includes(f.toLowerCase())).forEach(c => {
                let d = document.createElement('div'); d.className = 'cc' + (pickerSel.has(c.code) ? ' sel' : '');
                let img = document.createElement('img'); img.src = `https://flagcdn.com/w160/${c.code.toLowerCase()}.png`;
                let nm = document.createElement('div'); nm.className = 'cn'; nm.textContent = c.name;
                d.appendChild(img); d.appendChild(nm);
                if (pickerSel.has(c.code)) { let b = document.createElement('div'); b.className = 'bdg'; b.textContent = [...pickerSel].indexOf(c.code) + 1; d.appendChild(b); }
                d.addEventListener('click', () => { if (pickerSel.has(c.code)) pickerSel.delete(c.code); else if (pickerSel.size < 16) pickerSel.add(c.code); updatePicker(); });
                g.appendChild(d);
            });
        }
        let pickerSel = new Set();
        function updatePicker() { document.getElementById('sel-count').textContent = pickerSel.size; document.getElementById('btn-start').disabled = pickerSel.size !== 16; buildGrid(document.getElementById('search-input').value); }
        function showPicker() { pickerSel.clear(); buildGrid(); updatePicker(); document.getElementById('picker-overlay').classList.add('show'); }
        function hidePicker() { document.getElementById('picker-overlay').classList.remove('show'); }

        document.getElementById('btn-auto').addEventListener('click', () => { pickerSel.clear(); shuffleArr(allCountries).slice(0, 16).forEach(c => pickerSel.add(c.code)); updatePicker(); });
        document.getElementById('btn-clear').addEventListener('click', () => { pickerSel.clear(); updatePicker(); });
        document.getElementById('btn-start').addEventListener('click', () => {
            if (pickerSel.size !== 16) return; hidePicker();
            let chosen = allCountries.filter(c => pickerSel.has(c.code));
            gameState.mode = 'br'; gameState.brCountries = chosen; gameState.maxBrRounds = 6;
            gameState.brScores = {}; gameState.brPrevScores = {}; gameState.wins = {}; gameState.roundHistory = []; gameState.roundStats = []; gameState.lastRoundKP = {}; gameState.lastRoundPP = {};
            gameState.grandFinalEarlyWinner = null; gameState.placementCounts = {};
            gameState.globalStats = { kills: {}, wins: {}, placementPts: {}, lastRank: {} };
            chosen.forEach(c => { gameState.brScores[c.code] = 0; gameState.brPrevScores[c.code] = 0; gameState.wins[c.code] = 0; });
            gameState.brRound = 0; gameState.tourneyPhase = 0; gameState.midMatch = null; gameState.showMatchReport = false;
            saveGameState();
            window.phaserGame.scene.stop('MenuScene'); window.phaserGame.scene.start('BRRoundSelectScene');
        });
        document.getElementById('search-input').addEventListener('input', e => buildGrid(e.target.value));

        function makeCircleTexture(scene, code) {
            if (scene.textures.exists(code + '_c')) return;
            let src = scene.textures.get(code).getSourceImage();
            let cv = document.createElement('canvas'); cv.width = 128; cv.height = 128; let ctx = cv.getContext('2d');
            ctx.beginPath(); ctx.arc(64, 64, 62, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
            ctx.drawImage(src, 0, 0, 128, 128);
            ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI * 2); ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.stroke();
            scene.textures.addImage(code + '_c', cv);
        }

        function getAdvancingCount() {
            if (gameState.tourneyPhase === 1) return 4;
            if (gameState.tourneyPhase === 2) return 5;
            if (gameState.tourneyPhase === 3) return 1;
            return 0;
        }

        function addEsportsOverlay(scene, state = 'before') {
            scene.add.text(530, 15, CONFIG.tiktokId, { fontFamily: 'Poppins', fontSize: '13px', fontStyle: 'bold', color: '#ffffff', alpha: 0.6 }).setOrigin(1, 0).setDepth(1000);
            let prompt = state === 'before' ? '👇 COMMENT YOUR PREDICTION' : '❤️ LIKE  ➕ FOLLOW  🏆 FOR NEXT MATCH';
            let col = state === 'before' ? '#FFD700' : '#00F3FF';
            let txt = scene.add.text(270, 930, prompt, { fontFamily: 'Poppins', fontSize: '16px', fontStyle: 'bold', color: col, stroke: '#000', strokeThickness: 3 }).setOrigin(0.5).setDepth(1000);
            scene.tweens.add({ targets: txt, scale: 1.05, duration: 800, yoyo: true, repeat: -1 });
            return txt;
        }

        // ── MENU SCENE ──
        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            preload() { this.load.crossOrigin = 'Anonymous'; allCountries.forEach(c => this.load.image(c.code, `https://flagcdn.com/w160/${c.code.toLowerCase()}.png`)); }
            create() {
                createArenaBackground(this);
                if (!gameState.seasons) gameState.seasons = []; if (typeof gameState.seasonSaved === 'undefined') gameState.seasonSaved = false;
                allCountries.forEach(c => makeCircleTexture(this, c.code));

                this.add.text(270, 75, 'WORLD CUP MARBLE TOURNAMENT', { fontFamily: 'Montserrat', fontSize: '26px', fontStyle: '900', color: '#FFF', align: 'center', wordWrap: {width: 480} }).setOrigin(0.5).setDepth(1);
                this.add.text(270, 120, 'ESPORTS BROADCAST EDITION', { fontFamily: 'Poppins', fontSize: '14px', fontStyle: 'bold', color: '#00F3FF', letterSpacing: 2 }).setOrigin(0.5).setDepth(1);

                this.makeBtn(270, 210, '⚡ PRACTICE MODE', '60 countries • Bounce & Survive', 0x900C3F, 0xC70039, () => {
                    gameState.mode = 'normal'; gameState.eliminatedNames = []; gameState.activeRoster = getUniqueCountryPool(60); saveGameState(); this.scene.start('GameScene');
                });
                this.makeBtn(270, 300, '🥊 CUSTOM BATTLE ROYALE', 'Pick 16 • 6 rounds • Points system', 0x7000FF, 0xB026FF, () => showPicker());

                let canPlayTourney = true; let tourneyColor = 0x0055FF; let tourneyHover = 0x00F3FF;
                if (gameState.seasons && gameState.seasons.length > 0) {
                    let lastSeason = gameState.seasons[gameState.seasons.length - 1]; let now = new Date();
                    if (lastSeason.month === now.getMonth() && lastSeason.year === now.getFullYear()) {
                        canPlayTourney = false; tourneyColor = 0x222330; tourneyHover = 0x3a3b4d;
                    }
                }

                this.makeBtn(270, 390, '🏆 48-TEAM TOURNAMENT', canPlayTourney ? '3 Groups • Starts at Semi-Finals' : '🔒 Next Season unlocks next month!', tourneyColor, tourneyHover, () => {
                    if (!canPlayTourney) { alert("Wait until next month to start a new tournament."); return; }
                    gameState.tourneyPhase = 2; gameState.tourneyGroups = []; gameState.tourneyAdvancing = getUniqueCountryPool(48);
                    gameState.currentGroupIdx = 0; gameState.brRound = 0; gameState.roundStats = [];
                    gameState.grandFinalEarlyWinner = null; gameState.seasonSaved = false; gameState.placementCounts = {};
                    gameState.globalStats = { kills: {}, wins: {}, placementPts: {}, lastRank: {} };
                    saveGameState(); this.scene.start('TourneyScene');
                }, !canPlayTourney);

                this.makeBtn(270, 480, '🌍 192-TEAM TOURNAMENT', canPlayTourney ? '12 Groups • The Ultimate Global Bracket' : '🔒 Next Season unlocks next month!', 0x0033AA, 0x0055FF, () => {
                    if (!canPlayTourney) { alert("Wait until next month to start a new tournament."); return; }
                    gameState.tourneyPhase = 1; gameState.tourneyGroups = []; gameState.tourneyAdvancing = []; gameState.currentGroupIdx = 0; gameState.brRound = 0; gameState.roundStats = [];
                    gameState.grandFinalEarlyWinner = null; gameState.seasonSaved = false; gameState.placementCounts = {};
                    gameState.globalStats = { kills: {}, wins: {}, placementPts: {}, lastRank: {} };
                    saveGameState(); this.scene.start('TourneyScene');
                }, !canPlayTourney);

                this.makeBtn(270, 570, '📚 HALL OF FAME', 'View past champions & top 16 ranks', 0x009933, 0x00FF55, () => { this.scene.start('HistoryScene'); }, false, '#FFF', '#000');

                let savedData = localStorage.getItem('marbleRaceSave');
                if (savedData) {
                    this.makeBtn(270, 680, '💾 RESUME BROADCAST', 'Load your last saved match', 0xFF8800, 0xFFD700, () => {
                        try {
                            let parsed = JSON.parse(savedData); Object.assign(gameState, parsed);
                            if (gameState.midMatch && gameState.midMatch.active) this.scene.start('BRGameScene');
                            else if (gameState.tourneyPhase > 0) this.scene.start('TourneyScene');
                            else if (gameState.mode === 'br') this.scene.start('BRRoundSelectScene');
                            else this.scene.start('GameScene');
                        } catch (e) { console.error(e); }
                    }, false, '#FFF', '#000');
                }
                addEsportsOverlay(this, 'before');
            }
            makeBtn(x, y, title, sub, colD, colH, cb, disabled=false, tCol1='#FFF', tCol2='#FFF') {
                let bg = this.add.rectangle(x, y, 380, 75, disabled?colD:colH, 1).setInteractive().setDepth(1);
                if (!disabled) bg.setStrokeStyle(2, colH); else bg.setAlpha(0.7);
                bg.isFilled = true; bg.fillColor = colD;
                this.add.text(x, y - 12, title, { fontFamily: 'Montserrat', fontSize: '20px', fontStyle: '900', color: tCol1 }).setOrigin(0.5).setDepth(2);
                this.add.text(x, y + 14, sub, { fontFamily: 'Poppins', fontSize: '11px', color: disabled?'#999':tCol2, fontStyle: '600' }).setOrigin(0.5).setDepth(2);
                bg.on('pointerdown', () => { if(!disabled) cb(); });
            }
        }

        // ── HISTORY HUB SCENE ──
        class HistoryScene extends Phaser.Scene {
            constructor() { super('HistoryScene'); }
            create() {
                createArenaBackground(this);
                this.add.text(270, 60, 'HALL OF FAME', { fontFamily: 'Montserrat', fontSize: '30px', fontStyle: '900', color: '#FFD700' }).setOrigin(0.5).setDepth(1);

                this.actionBtn = this.add.rectangle(270, 830, 360, 65, 0x00FF55).setInteractive().setStrokeStyle(2, 0x00B33C).setDepth(1);

                        gameState.brScores = {}; gameState.brPrevScores = {}; gameState.wins = {}; gameState.roundHistory = []; gameState.roundStats = []; gameState.showMatchReport = false; gameState.placementCounts = {};
                        currentGroup.forEach(c => { gameState.brScores[c.code] = 0; gameState.brPrevScores[c.code] = 0; gameState.wins[c.code] = 0; });
                    }
                    gameState.mode = 'br'; saveGameState(); this.scene.start('BRRoundSelectScene');
                });
                addEsportsOverlay(this, 'before');

            initPhase() {
                if (gameState.tourneyPhase === 1) {
                    gameState.maxBrRounds = 6; gameState.tourneyAdvancing = []; gameState.grandFinalEarlyWinner = null; gameState.seasonSaved = false; gameState.placementCounts = {};
                    const pool = getUniqueCountryPool(192); gameState.tourneyGroups = [];
                    for (let i = 0; i < 12; i++) gameState.tourneyGroups.push(pool.slice(i * 16, (i + 1) * 16));
                    gameState.currentGroupIdx = 0;

                    if (gameState.tourneyAdvancing.length === 0) { gameState.tourneyAdvancing = getUniqueCountryPool(48); }
                    gameState.maxBrRounds = 6; let shuffled = Phaser.Utils.Array.Shuffle([...gameState.tourneyAdvancing]); gameState.tourneyGroups = [];
                    for (let i = 0; i < 3; i++) gameState.tourneyGroups.push(shuffled.slice(i * 16, (i + 1) * 16));
                    gameState.tourneyAdvancing = []; gameState.wildcards = []; gameState.currentGroupIdx = 0;
                } else if (gameState.tourneyPhase === 3) {
                    gameState.maxBrRounds = 12; gameState.grandFinalEarlyWinner = null; gameState.placementCounts = {};
                    gameState.tourneyGroups = [gameState.tourneyAdvancing]; gameState.tourneyAdvancing = []; gameState.currentGroupIdx = 0;
                }
                gameState.roundStats = []; saveGameState();
            }
            processGroupResults() {
                let sorted = [...gameState.brCountries].sort(globalSort);
                if (gameState.tourneyPhase === 3) {
                    if (gameState.grandFinalEarlyWinner) { let winObj = gameState.brCountries.find(c => c.code === gameState.grandFinalEarlyWinner); gameState.tourneyAdvancing = [winObj]; }
                    else { gameState.tourneyAdvancing = [sorted[0]]; }
                    gameState.tourneyPhase = 4; saveGameState(); this.scene.restart(); return;
                }
                if (gameState.tourneyPhase === 1) gameState.tourneyAdvancing.push(...sorted.slice(0, 4));
                else if (gameState.tourneyPhase === 2) { gameState.tourneyAdvancing.push(...sorted.slice(0, 5)); gameState.wildcards.push(sorted[5]); }
                gameState.currentGroupIdx++; gameState.brRound = 0;
                if (gameState.currentGroupIdx >= gameState.tourneyGroups.length) {
                    if (gameState.tourneyPhase === 2) {
                        let bestWc = gameState.wildcards.sort(globalSort)[0];
                        gameState.tourneyAdvancing.push(bestWc);
                    }
                    gameState.tourneyPhase++; gameState.tourneyGroups = [];
                }
                saveGameState(); this.scene.restart();
            }
        }

                    let kpA = gameState.lastRoundKP[a.code] || 0; let kpB = gameState.lastRoundKP[b.code] || 0;

            playCountdown() {

            updateRingRadius(newRadius) {
                this.RR = newRadius; if (this.ringBodies) { this.ringBodies.forEach(b => this.matter.world.remove(b)); } this.ringBodies = [];
                const NS = 72;
                for (let i = 0; i < NS; i++) {
                    let a = (i / NS) * Math.PI * 2, x = this.CX + Math.cos(a) * this.RR, y = this.CY + Math.sin(a) * this.RR;
                    let b = this.matter.add.rectangle(x, y, (Math.PI * 2 * this.RR / NS) + 3, 14, { isStatic: true, angle: a, friction: 0, restitution: 1.1 });
                    this.ringBodies.push(b);
                }
                this.activeBalls.forEach(ball => {
                    let dist = Phaser.Math.Distance.Between(ball.body.x, ball.body.y, this.CX, this.CY);
                    if (dist > this.RR - 22) { let angle = Phaser.Math.Angle.Between(this.CX, this.CY, ball.body.x, ball.body.y); ball.body.setPosition(this.CX + Math.cos(angle) * (this.RR - 35), this.CY + Math.sin(angle) * (this.RR - 35)); ball.body.setVelocity(-Math.cos(angle) * 3, -Math.sin(angle) * 3); }
                });
            }

            spawnBalls() {
                let spawnList = gameState.brCountries; let loadedStates = null;
                if (gameState.midMatch && gameState.midMatch.active && gameState.midMatch.round === gameState.brRound) {
                    this.dmg = gameState.midMatch.dmg || {}; this.finishOrder = gameState.midMatch.finishOrder || []; this.killFeedLog = gameState.midMatch.killFeedLog || []; this.killFeedLog.forEach(log => this.updateKillFeedUI()); loadedStates = gameState.midMatch.players || []; spawnList = gameState.brCountries.filter(c => loadedStates.some(p => p.code === c.code));
                } else { gameState.brCountries.forEach(c => this.dmg[c.code] = 0); this.finishOrder = []; }
                spawnList.forEach((c, idx) => {
                    let a = (idx / 16) * Math.PI * 2; let r = Phaser.Math.Between(30, 150);
                    let pState = loadedStates ? loadedStates.find(p => p.code === c.code) : null;
                    let sx = pState ? pState.x : (this.CX + Math.cos(a) * r); let sy = pState ? pState.y : (this.CY + Math.sin(a) * r);
                    let vis = this.add.image(sx, sy, c.code + '_c').setDisplaySize(32, 32).setDepth(5);
                    let body = this.matter.add.gameObject(vis, { shape: { type: 'circle', radius: 16 }, restitution: 1.1, friction: 0, density: 0.01 });
                    let vx = pState ? pState.vx : Math.cos(Phaser.Math.Between(0, 359) * (Math.PI / 180)) * 2.5; let vy = pState ? pState.vy : Math.sin(Phaser.Math.Between(0, 359) * (Math.PI / 180)) * 2.5; body.setVelocity(vx, vy);
                    this.activeBalls.push({ body, data: c, hp: pState ? pState.hp : 4, hasGun: pState ? pState.hasGun : false, ammo: pState ? pState.ammo : 0, hasShield: pState ? pState.hasShield : false, bullets: [] });
                });
                this.aliveT.setText(`${this.activeBalls.length}`);
            }

            createRankingPanel() {

                panelBg.fillStyle(0x090a14, 0.7); panelBg.fillRoundedRect(panelX, panelY, panelW, panelH, 10);

                this.add.text(panelX + 145, panelY + 36, 'TOTAL', { fontFamily: 'Poppins', fontSize: '9px', fontStyle:'bold', color: '#FFD700' }).setOrigin(0.5, 0.5).setDepth(20);

                }
            }

            updateRankingPanel() {
                let advLimit = getAdvancingCount();
                let sortedData = gameState.brCountries.map(c => {
                    let ball = this.activeBalls.find(b => b.data.code === c.code); let isAlive = !!ball; let hp = isAlive ? ball.hp : 0;
                    let basePts = gameState.brPrevScores[c.code] || 0; let currentKills = this.dmg[c.code] || 0;
                    return { code: c.code, name: c.name, isAlive, hp, score: basePts + currentKills, matchKills: currentKills };
                });
                sortedData.sort((a, b) => { let diff = b.score - a.score; if (diff !== 0) return diff; if (b.isAlive !== a.isAlive) return b.isAlive - a.isAlive; return a.name.localeCompare(b.name); });
                sortedData.forEach((data, i) => {
                    let row = this.rankRows[i]; row.posTxt.setText(`${i+1}.`);
                    if (this.textures.exists(data.code + '_c')) { row.flagImg.setTexture(data.code + '_c').setDisplaySize(16, 16); }
                    let dispName = data.name.length > 7 ? data.name.substring(0, 6) + '..' : data.name;
                    if (gameState.tourneyPhase === 3 && gameState.brScores[data.code] >= 92) dispName += "⭐";
                    row.nameTxt.setText(dispName.toUpperCase()); row.kpTxt.setText(`${data.matchKills}`); row.totTxt.setText(`${data.score}`);
                    let isQualifyingZone = (gameState.tourneyPhase > 0 && i < advLimit);
                    if (data.isAlive) {
                        row.nameTxt.setColor('#ffffff');
                        if (i === 0) { row.rowBg.setStrokeStyle(2, 0xFFD700, 1); row.rowBg.setFillStyle(0x3d2b00, 0.8); row.posTxt.setColor('#FFD700'); }
                        else if (isQualifyingZone) { row.rowBg.setStrokeStyle(1.5, 0x00FF55, 0.9); row.rowBg.setFillStyle(0x002e11, 0.7); row.posTxt.setColor('#FFF'); }
                        else { row.rowBg.setStrokeStyle(1, 0x2a2b40, 0.6); row.rowBg.setFillStyle(0x131426, 0.6); row.posTxt.setColor('#888'); }
                        let hearts = ''; for(let h=0; h<4; h++) hearts += (h < data.hp ? '♥' : '♡');
                        row.hpTxt.setText(hearts).setColor(data.hp > 2 ? '#00FF55' : '#FF0055');
                    } else {
                        row.nameTxt.setColor('#666666'); row.rowBg.setFillStyle(0x07080f, 0.5); row.rowBg.setStrokeStyle(1, 0x1a1b26, 0.5); row.posTxt.setColor('#444');
                        row.hpTxt.setText('💀').setColor('#666666');
                    }
                });
            }

            saveMidMatch() {
                if (this.isRoundOver) return;
                gameState.midMatch = { active: true, round: gameState.brRound, dmg: this.dmg, finishOrder: this.finishOrder, killFeedLog: this.killFeedLog, players: this.activeBalls.map(b => ({ code: b.data.code, hp: b.hp, hasGun: b.hasGun, ammo: b.ammo, hasShield: b.hasShield, x: b.body.x, y: b.body.y, vx: b.body.body.velocity.x, vy: b.body.body.velocity.y })) };
                saveGameState();
            }

            spawnItems() {
                if (this.isRoundOver || !this.matchStarted) return;
                let gunAngles = [];
                for(let i = 0; i < 2; i++) {
                    let a = Phaser.Math.FloatBetween(0, Math.PI * 2);
                    if (i === 1 && gunAngles[0]) { while (Math.abs(a - gunAngles[0]) < 0.6) { a = Phaser.Math.FloatBetween(0, Math.PI * 2); } }
                    gunAngles.push(a); let d = Phaser.Math.FloatBetween(25, this.RR - 35);
                    let ix = this.CX + Math.cos(a) * d, iy = this.CY + Math.sin(a) * d;
                    let lbl = this.add.text(ix, iy, '🔫', { fontSize: '18px' }).setOrigin(0.5).setDepth(4);
                    this.floorItems.push({ x: ix, y: iy, type: 'gun', ammo: Phaser.Math.Between(2, 3), lbl, active: true });
                }
                let sa = Phaser.Math.FloatBetween(0, Math.PI * 2); let sd = Phaser.Math.FloatBetween(25, this.RR - 35);
                let sx = this.CX + Math.cos(sa) * sd, sy = this.CY + Math.sin(sa) * sd;
                let slbl = this.add.text(sx, sy, '🛡', { fontSize: '18px' }).setOrigin(0.5).setDepth(4);
                this.floorItems.push({ x: sx, y: sy, type: 'shield', ammo: 0, lbl: slbl, active: true });
            }

            doShooting() {
                if (this.isRoundOver || !this.matchStarted) return;
                this.activeBalls.forEach(ball => {
                    if (!ball.hasGun || ball.ammo <= 0) return;
                    let nearest = null, minD = 9999;
                    this.activeBalls.forEach(o => { if (o !== ball) { let d = Phaser.Math.Distance.Between(ball.body.x, ball.body.y, o.body.x, o.body.y); if (d < minD) { minD = d; nearest = o; } } });
                    if (!nearest) return;
                    let dx = nearest.body.x - ball.body.x, dy = nearest.body.y - ball.body.y;
                    let len = Math.sqrt(dx * dx + dy * dy); dx /= len; dy /= len;
                    let bg = this.add.circle(ball.body.x, ball.body.y, 3, 0x00F3FF).setDepth(9);
                    ball.ammo--; if (ball.ammo <= 0) ball.hasGun = false;
                    ball.bullets.push({ gfx: bg, vx: dx * 7.5, vy: dy * 7.5, life: 60, owner: ball });
                });
            }

            pickupItems() {
                this.activeBalls.forEach(ball => {
                    this.floorItems.forEach(item => {
                        if (!item.active) return;
                        if (Phaser.Math.Distance.Between(ball.body.x, ball.body.y, item.x, item.y) < 22) {
                            item.active = false; item.lbl.destroy();
                            if (item.type === 'gun') { ball.hasGun = true; ball.ammo += item.ammo; } else { ball.hasShield = true; }
                        }
                    });
                });
                this.floorItems = this.floorItems.filter(i => i.active);
            }

            showElimPopup(countryData, rank, currentPoints) {
                let container = this.add.container(270, -100).setDepth(500);
                let bg = this.add.rectangle(0, 0, 260, 95, 0x1a050a, 0.95).setStrokeStyle(3, 0xFF0055);
                let skull = this.add.text(0, -30, '💀 ELIMINATED', { fontFamily: 'Montserrat', fontSize: '18px', fontStyle: '900', color: '#FF0055' }).setOrigin(0.5);
                let rankTxt = this.add.text(0, -8, `${rank}TH PLACE`, { fontFamily: 'Poppins', fontSize: '12px', fontStyle: 'bold', color: '#FFF' }).setOrigin(0.5);
                let flag = this.add.image(-50, 20, countryData.code + '_c').setDisplaySize(24, 24);
                let nameTxt = this.add.text(-25, 20, countryData.name.toUpperCase(), { fontFamily: 'Poppins', fontSize: '14px', fontStyle: 'bold', color: '#FFD700' }).setOrigin(0, 0.5);
                let ptsTxt = this.add.text(0, 42, `${currentPoints} POINTS`, { fontFamily: 'Poppins', fontSize: '13px', fontStyle: 'bold', color: '#00FF55' }).setOrigin(0.5);
                container.add([bg, skull, rankTxt, flag, nameTxt, ptsTxt]);
                this.tweens.add({ targets: container, y: 300, duration: 400, ease: 'Back.easeOut', onComplete: () => {
                    this.time.delayedCall(1500, () => { this.tweens.add({ targets: container, y: 1000, alpha: 0, duration: 400, ease: 'Power2', onComplete: () => container.destroy() }); });
                }});
            }

            updateBullets() {
                this.activeBalls.forEach(ball => {
                    for (let i = ball.bullets.length - 1; i >= 0; i--) {
                        let b = ball.bullets[i]; b.gfx.x += b.vx; b.gfx.y += b.vy; b.life--;
                        if (b.life <= 0) { b.gfx.destroy(); ball.bullets.splice(i, 1); continue; }
                        for (let j = 0; j < this.activeBalls.length; j++) {
                            let other = this.activeBalls[j]; if (other === ball) continue;
                            if (Phaser.Math.Distance.Between(b.gfx.x, b.gfx.y, other.body.x, other.body.y) < 18) {
                                b.gfx.destroy(); ball.bullets.splice(i, 1);
                                if (other.hasShield) { other.hasShield = false; }
                                else {
                                    other.hp = Math.max(0, other.hp - 1); this.dmg[ball.data.code] = (this.dmg[ball.data.code] || 0) + 1;
                                    let ballFlag = `<img src="https://flagcdn.com/w160/${ball.data.code.toLowerCase()}.png">`;
                                    let otherFlag = `<img src="https://flagcdn.com/w160/${other.data.code.toLowerCase()}.png">`;
                                    this.addToFeed(`<div class="feed-item">${this.shortenName(ball.data.name)} ${ballFlag} <span class="gun-flipped">🔫</span> ${otherFlag} ${this.shortenName(other.data.name)}</div>`);
                                    this.updateRankingPanel();
                                }
                                break;
                            }
                        }
                    }
                });
            }

            addToFeed(htmlContent) { this.killFeedLog.push(htmlContent); if (this.killFeedLog.length > 5) this.killFeedLog.shift(); this.updateKillFeedUI(); }
            updateKillFeedUI() { document.getElementById('kill-feed-list').innerHTML = this.killFeedLog.join(''); }
            shortenName(name) { return name.length > 7 ? name.substring(0, 6) + '.' : name; }

            update() {
                if (this.isRoundOver || !this.matchStarted) return;
                this.pickupItems(); this.updateBullets();

                if (this.activeBalls.length <= 12 && this.currentZoneStage === 0) {
                    this.currentZoneStage = 1; this.CX = 270; this.updateRingRadius(180); this.cameras.main.flash(300, 0, 243, 255);
                } else if (this.activeBalls.length <= 8 && this.currentZoneStage === 1) {
                    this.currentZoneStage = 2; this.CX = 190; this.updateRingRadius(140); this.cameras.main.flash(300, 0, 243, 255);
                } else if (this.activeBalls.length <= 4 && this.currentZoneStage === 2) {
                    this.currentZoneStage = 3; this.CX = 190; this.updateRingRadius(100); this.cameras.main.flash(300, 0, 243, 255);
                }

                this.ringGfx.clear(); this.ringGfx.lineStyle(8, 0x00F3FF, 0.8); this.ringGfx.strokeCircle(this.CX, this.CY, this.RR);

                for (let i = this.activeBalls.length - 1; i >= 0; i--) {
                    let ball = this.activeBalls[i]; let dist = Phaser.Math.Distance.Between(ball.body.x, ball.body.y, this.CX, this.CY);
                    if (ball.hp <= 0 || dist > this.RR + 20) {
                        let rank = this.activeBalls.length;
                        let currentPoints = this.dmg[ball.data.code] || 0;
                        this.showElimPopup(ball.data, rank, currentPoints);
                        ball.body.destroy(); this.finishOrder.push(ball.data.code);
                        if (dist > this.RR + 20) {
                            let deadFlag = `<img src="https://flagcdn.com/w160/${ball.data.code.toLowerCase()}.png">`;
                            this.addToFeed(`<div class="feed-item ring-death">💀 RING ${deadFlag} ${this.shortenName(ball.data.name)}</div>`);
                        }
                        this.activeBalls.splice(i, 1); this.aliveT.setText(`${this.activeBalls.length}`); this.updateRankingPanel();
                    } else {
                        let vel = new Phaser.Math.Vector2(ball.body.body.velocity.x, ball.body.body.velocity.y); vel.x += Phaser.Math.FloatBetween(-0.1, 0.1); vel.y += Phaser.Math.FloatBetween(-0.1, 0.1);
                        let spd = vel.length(); if (spd < 2.2) vel.normalize().scale(2.5); else if (spd > 4.0) vel.normalize().scale(4.0);
                        ball.body.setVelocity(vel.x, vel.y);
                    }
                }

                if (this.activeBalls.length <= 1) { this.isRoundOver = true; if (this.activeBalls.length === 1) this.finishOrder.push(this.activeBalls[0].data.code); this.endRound(); }
            }

            endRound() {
                document.getElementById('kill-feed-container').style.display = 'none';
                gameState.prevRankMap = {};
                [...gameState.brCountries].sort(globalSort).forEach((c, i) => gameState.prevRankMap[c.code] = i + 1);

                let ptMap = { 1: 10, 2: 6, 3: 5, 4: 4, 5: 3, 6: 2, 7: 1, 8: 1 }; let winnerCode = this.finishOrder[this.finishOrder.length - 1];
                gameState.wins[winnerCode] = (gameState.wins[winnerCode] || 0) + 1;
                if (gameState.tourneyPhase === 3 && gameState.brPrevScores[winnerCode] >= 92) { gameState.grandFinalEarlyWinner = winnerCode; }

                if (!gameState.globalStats) gameState.globalStats = { kills: {}, wins: {}, placementPts: {}, lastRank: {} };
                if (!gameState.globalStats.lastRank) gameState.globalStats.lastRank = {};

                gameState.lastRoundKP = {}; gameState.lastRoundPP = {}; let roundKP = {}; let roundPP = {};

                // Update placement distribution
                if (!gameState.placementCounts) gameState.placementCounts = {};

                this.finishOrder.forEach((code, idx) => {
                    let placement = this.finishOrder.length - idx; // 1st to 16th
                    gameState.globalStats.lastRank[code] = placement;

                    let pp = ptMap[placement] || 0; let kp = this.dmg[code] || 0;
                    gameState.brScores[code] = (gameState.brScores[code] || 0) + kp + pp; gameState.brPrevScores[code] = gameState.brScores[code];
                    gameState.lastRoundKP[code] = kp; gameState.lastRoundPP[code] = pp; roundKP[code] = kp; roundPP[code] = pp;
                    gameState.globalStats.kills[code] = (gameState.globalStats.kills[code] || 0) + kp; gameState.globalStats.placementPts[code] = (gameState.globalStats.placementPts[code] || 0) + pp;

                    // Track placement counts
                    if (!gameState.placementCounts[code]) gameState.placementCounts[code] = new Array(17).fill(0);
                    gameState.placementCounts[code][placement]++;
                });

                gameState.globalStats.wins[winnerCode] = (gameState.globalStats.wins[winnerCode] || 0) + 1;
                gameState.roundStats.push({ kp: roundKP, pp: roundPP }); gameState.midMatch = null; gameState.showMatchReport = true; saveGameState();

                let winnerObj = gameState.brCountries.find(c => c.code === winnerCode);
                this.cameras.main.flash(800, 255, 215, 0);
                this.winnerTxt.setText(`🏆 MATCH WINNER\n${winnerObj ? winnerObj.name.toUpperCase() : '???'}\n+10 POINTS`).setScale(0.5);
                this.tweens.add({ targets: this.winnerTxt, alpha: 1, scale: 1.1, duration: 800, ease: 'Elastic.easeOut' });
                this.add.particles(0, 0, winnerCode+'_c', { x: 270, y: 540, speed: { min: 200, max: 600 }, angle: { min: 0, max: 360 }, scale: { start: 1, end: 0 }, lifespan: 2000, quantity: 25, blendMode: 'ADD' }).setDepth(299);
                if (this.tiktokBottomTxt) { this.tiktokBottomTxt.setText("❤️ LIKE   ➕ FOLLOW   🏆 FOR NEXT MATCH").setColor("#00F3FF"); }
                if (this.itemT) this.itemT.remove(); if (this.shootT) this.shootT.remove();
                this.time.delayedCall(4500, () => this.scene.start('BRRoundSelectScene'));
            }
        }

        // ── TOURNAMENT STATS SCENE (unchanged but with background) ──
        class TourneyStatsScene extends Phaser.Scene {
            constructor() { super('TourneyStatsScene'); this.currentTab = 'kills'; this.viewGroupIdx = 0; }
            create() {
                createArenaBackground(this);
                this.add.text(270, 45, '📊 TOURNAMENT MASTER HUB', { fontFamily: 'Montserrat', fontSize: '22px', fontStyle: '900', color: '#FFD700' }).setOrigin(0.5).setDepth(1);
                this.createTabBtn(68, 110, '⚔️ KILLS', 'kills', 115); this.createTabBtn(198, 110, '🏆 WINS', 'wins', 115); this.createTabBtn(328, 110, '🎯 PLACE', 'placements', 115); this.createTabBtn(465, 110, '📋 GROUPS', 'groups', 130);
                this.renderStatsList();
                let backBtn = this.add.rectangle(270, 890, 360, 60, 0x7000FF).setInteractive().setStrokeStyle(2, 0xB026FF).setDepth(1);
                this.add.text(270, 890, '🏠 RETURN TO TOURNAMENT', { fontFamily: 'Poppins', fontSize: '16px', fontStyle: 'bold', color: '#fff' }).setOrigin(0.5).setDepth(2);
                backBtn.on('pointerdown', () => this.scene.start('TourneyScene'));
                addEsportsOverlay(this, 'before');
            }
            createTabBtn(x, y, label, tabKey, w = 150) {
                let isActive = this.currentTab === tabKey;
                let btn = this.add.rectangle(x, y, w, 40, isActive ? 0x0055FF : 0x131426, 0.8).setInteractive().setStrokeStyle(2, isActive ? 0x00F3FF : 0x2a2b40).setDepth(1);
                this.add.text(x, y, label, { fontFamily: 'Poppins', fontSize: '13px', fontStyle: 'bold', color: isActive ? '#fff' : '#aaa' }).setOrigin(0.5).setDepth(2);
                btn.on('pointerdown', () => { this.currentTab = tabKey; this.scene.restart(); });
            }
            renderStatsList() {
                if (this.currentTab === 'groups') { this.renderGroupsTab(); return; }
                if (!gameState.globalStats) gameState.globalStats = { kills: {}, wins: {}, placementPts: {}, lastRank: {} };
                let sourceData = []; let statColor = '#fff';
                if (this.currentTab === 'kills') { sourceData = Object.keys(gameState.globalStats.kills).map(code => ({ code, val: gameState.globalStats.kills[code] })); statColor = '#FF0055'; }
                else if (this.currentTab === 'wins') { sourceData = Object.keys(gameState.globalStats.wins).map(code => ({ code, val: gameState.globalStats.wins[code] })); statColor = '#FFD700'; }
                else { sourceData = Object.keys(gameState.globalStats.placementPts).map(code => ({ code, val: gameState.globalStats.placementPts[code] })); statColor = '#00F3FF'; }
                sourceData.sort((a, b) => b.val - a.val); let top10 = sourceData.slice(0, 10);
                if (top10.length === 0) { this.add.text(270, 450, 'NO STATISTICS RECORDED YET.', { fontFamily: 'Poppins', fontSize: '16px', fontStyle: 'bold', color: '#666', align: 'center' }).setOrigin(0.5).setDepth(1); return; }
                top10.forEach((item, idx) => {
                    let y = 160 + idx * 60; let matchCountry = allCountries.find(c => c.code === item.code) || { name: item.code };
                    this.add.rectangle(270, y + 25, 480, 52, idx < 3 ? 0x181a36 : 0x090a14, 0.8).setOrigin(0.5).setStrokeStyle(1.5, idx === 0 ? 0xFFD700 : 0x2a2b40).setDepth(1);
                    let rankIcon = idx === 0 ? '👑 1.' : idx === 1 ? '🥈 2.' : idx === 2 ? '🥉 3.' : `   ${idx+1}.`;
                    this.add.text(30, y + 15, rankIcon, { fontFamily: 'Montserrat', fontSize: '16px', fontStyle: '900', color: idx === 0 ? '#FFD700' : '#ccc' }).setOrigin(0, 0).setDepth(2);
                    if (this.textures.exists(item.code + '_c')) this.add.image(95, y + 25, item.code + '_c').setDisplaySize(36, 36).setDepth(2);
                    this.add.text(125, y + 15, matchCountry.name.toUpperCase(), { fontFamily: 'Poppins', fontSize: '16px', fontStyle: 'bold', color: '#fff' }).setOrigin(0, 0).setDepth(2);
                    this.add.text(480, y + 12, `${item.val}`, { fontFamily: 'Montserrat', fontSize: '20px', fontStyle: '900', color: statColor }).setOrigin(1, 0).setDepth(2);
                });
            }
            renderGroupsTab() {
                if (!gameState.tourneyGroups || gameState.tourneyGroups.length === 0) {
                    this.add.text(270, 450, 'NO TOURNAMENT GROUPS GENERATED YET.\nSTART A TOURNAMENT FIRST!', { fontFamily: 'Poppins', fontSize: '15px', fontStyle: 'bold', color: '#666', align: 'center' }).setOrigin(0.5).setDepth(1);
                    return;
                }
                let totalGroups = gameState.tourneyGroups.length;
                if (this.viewGroupIdx >= totalGroups) this.viewGroupIdx = 0;
                let gLetter = gameState.tourneyPhase === 3 ? 'FINAL' : String.fromCharCode(65 + this.viewGroupIdx);
                this.add.text(270, 175, `TOURNAMENT PHASE ${gameState.tourneyPhase} - GROUP ${gLetter}`, { fontFamily: 'Montserrat', fontSize: '16px', fontStyle: '900', color: '#00F3FF' }).setOrigin(0.5).setDepth(1);
                if (totalGroups > 1) {
                    let prevBtn = this.add.rectangle(80, 175, 40, 35, 0x131426).setInteractive().setStrokeStyle(1.5, 0x00F3FF).setDepth(1);
                    this.add.text(80, 175, '◀', { fontStyle: 'bold', color: '#fff' }).setOrigin(0.5).setDepth(2);
                    prevBtn.on('pointerdown', () => { this.viewGroupIdx = (this.viewGroupIdx - 1 + totalGroups) % totalGroups; this.scene.restart(); });
                    let nextBtn = this.add.rectangle(460, 175, 40, 35, 0x131426).setInteractive().setStrokeStyle(1.5, 0x00F3FF).setDepth(1);
                    this.add.text(460, 175, '▶', { fontStyle: 'bold', color: '#fff' }).setOrigin(0.5).setDepth(2);
                    nextBtn.on('pointerdown', () => { this.viewGroupIdx = (this.viewGroupIdx + 1) % totalGroups; this.scene.restart(); });
                }
                let currentGroup = gameState.tourneyGroups[this.viewGroupIdx];
                if (currentGroup) {
                    currentGroup.forEach((c, idx) => {
                        let col = idx % 2, row = Math.floor(idx / 2), x = 145 + col * 250, y = 240 + row * 62;
                        let isCurrentPlayingGroup = (gameState.currentGroupIdx === this.viewGroupIdx && gameState.tourneyPhase !== 3);
                        let cardBg = this.add.rectangle(x, y, 230, 50, isCurrentPlayingGroup ? 0x052244 : 0x131426, 0.8).setStrokeStyle(1.5, isCurrentPlayingGroup ? 0x00FF55 : 0x2a2b40).setDepth(1);
                        if (this.textures.exists(c.code + '_c')) { this.add.image(x - 90, y, c.code + '_c').setDisplaySize(32, 32).setDepth(2); }
                        this.add.text(x - 60, y, c.name.toUpperCase().substring(0, 14), { fontFamily: 'Poppins', fontSize: '12px', fontStyle: 'bold', color: '#fff' }).setOrigin(0, 0.5).setDepth(2);
                        let score = gameState.brScores[c.code] !== undefined ? gameState.brScores[c.code] : 0;
                        this.add.text(x + 100, y, `${score}P`, { fontFamily: 'Montserrat', fontSize: '13px', fontStyle: '900', color: '#FFD700' }).setOrigin(1, 0.5).setDepth(2);
                    });
                }
            }
        }

        // ── BR FINAL SCENE ──
        class BRFinalScene extends Phaser.Scene {
            constructor() { super('BRFinalScene'); }
            create() {
                createArenaBackground(this);
                let sorted = [...gameState.brCountries].sort(globalSort);
                if (gameState.tourneyPhase === 3 && gameState.grandFinalEarlyWinner) {
                    let championIdx = sorted.findIndex(c => c.code === gameState.grandFinalEarlyWinner);
                    if (championIdx !== -1) { let championObj = sorted.splice(championIdx, 1)[0]; sorted.unshift(championObj); }
                }
                if (gameState.tourneyPhase === 3) {
                    this.add.particles(0, 0, sorted[0].code+'_c', { x: 270, y: 140, speed: { min: 20, max: 100 }, scale: { start: 0.3, end: 0 }, lifespan: 3000, quantity: 1, blendMode: 'ADD' }).setDepth(1);
                    this.add.text(270, 40, '━━━━━━━━━━━━━━━\nWORLD CHAMPION\n━━━━━━━━━━━━━━━', { fontFamily: 'Montserrat', fontSize: '24px', fontStyle: '900', color: '#FFD700', align: 'center', textShadow: '0 0 10px #FFD700' }).setOrigin(0.5).setDepth(1);
                    this.add.image(270, 130, sorted[0].code + '_c').setDisplaySize(64, 64).setDepth(2);
                } else {
                    this.add.text(270, 45, '🏆 BATTLE ROYALE', { fontFamily: 'Montserrat', fontSize: '24px', fontStyle: '900', color: '#FFD700' }).setOrigin(0.5).setDepth(1);
                }
                let advLimit = getAdvancingCount();
                let startY = gameState.tourneyPhase === 3 ? 190 : 100;
                sorted.forEach((c, i) => {
                    let y = startY + i * 44;
                    let isQualifying = (gameState.tourneyPhase === 3 && i === 0) || (gameState.tourneyPhase < 3 && gameState.tourneyPhase > 0 && i < advLimit);
                    let bgCol = isQualifying ? 0x002e11 : (i % 2 === 0 ? 0x131426 : 0x090a14);
                    let row = this.add.rectangle(270, y + 18, 480, 38, bgCol).setOrigin(0.5).setDepth(1);
                    if(isQualifying) row.setStrokeStyle(1.5, 0x00FF55, 0.8);
                    this.add.text(32, y + 9, `${i+1}.`, { fontFamily: 'Montserrat', fontSize: '14px', fontStyle: '900', color: isQualifying ? '#00FF55' : '#55566b' }).setOrigin(0, 0).setDepth(2);
                    if (this.textures.exists(c.code + '_c')) this.add.image(65, y + 18, c.code + '_c').setDisplaySize(26, 26).setDepth(2);
                    let suffix = (gameState.tourneyPhase === 3 && i === 0) ? " 🏆 CHAMPION" : "";
                    this.add.text(90, y + 9, c.name.toUpperCase() + suffix, { fontFamily: 'Poppins', fontSize: '14px', color: isQualifying ? '#00FF55' : '#aaa', fontStyle: isQualifying ? 'bold' : 'normal' }).setOrigin(0, 0).setDepth(2);
                    this.add.text(490, y + 9, `${gameState.brScores[c.code]} PTS`, { fontFamily: 'Montserrat', fontSize: '14px', color: '#FFD700', fontStyle: '900' }).setOrigin(1, 0).setDepth(2);
                });
                let btnTxt = gameState.tourneyPhase > 0 ? '▶ CONTINUE BRACKET' : '🏠 BACK TO MENU';
                let btn = this.add.rectangle(270, 890, 360, 60, 0x7000FF).setInteractive().setStrokeStyle(2, 0xB026FF).setDepth(1);
                this.add.text(270, 890, btnTxt, { fontFamily: 'Montserrat', fontSize: '18px', fontStyle: '900', color: '#fff' }).setOrigin(0.5).setDepth(2);
                btn.on('pointerdown', () => { if (gameState.tourneyPhase > 0) this.scene.start('TourneyScene'); else { gameState.tourneyPhase = 0; saveGameState(); this.scene.start('MenuScene'); } });
                addEsportsOverlay(this, 'after');
            }
        }

        // ── NORMAL MODE SCENE ──
        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }
            create() {
                this.cameras.main.setBackgroundColor('#0a0a1a'); this.matter.world.setGravity(0, 0); this.activeBalls = []; this.isGameOver = false;
                let topBar = this.add.rectangle(0, 0, 540, 110, 0x131426, 0.95).setOrigin(0).setDepth(20).setStrokeStyle(2, 0x00F3FF);
                this.aliveText = this.add.text(270, 40, `ALIVE: ${gameState.activeRoster.length}`, { fontFamily: 'Montserrat', fontSize: '24px', color: '#00FF55', fontStyle: '900' }).setOrigin(0.5).setDepth(20);
                this.elimBox = this.add.text(15, 125, 'ELIMINATED:\n', { fontFamily: 'Poppins', fontSize: '12px', fontStyle: 'bold', color: '#FF0055', wordWrap: { width: 180 } }).setOrigin(0, 0).setDepth(20);
                this.winnerTxt = this.add.text(270, 500, '', { fontFamily: 'Montserrat', fontSize: '42px', color: '#FFD700', fontStyle: '900', stroke: '#000', strokeThickness: 10, textShadow: '0 0 15px #FFD700', align: 'center' }).setOrigin(0.5).setDepth(30);
                this.CX = 270; this.CY = 540; this.RR = 230;
                this.createRing(); this.spawnBalls();
                addEsportsOverlay(this, 'before');
            }
            createRing() {
                this.ringGfx = this.add.graphics().setDepth(10); this.ringGfx.lineStyle(8, 0x00F3FF, 0.8); this.ringGfx.strokeCircle(this.CX, this.CY, this.RR);
                const NS = 72;
                for (let i = 0; i < NS; i++) {
                    let a = (i / NS) * Math.PI * 2, x = this.CX + Math.cos(a) * this.RR, y = this.CY + Math.sin(a) * this.RR;
                    this.matter.add.rectangle(x, y, (Math.PI * 2 * this.RR / NS) + 3, 13, { isStatic: true, angle: a, friction: 0, restitution: 1.1 });
                }
            }
            spawnBalls() {
                gameState.activeRoster.forEach(c => {
                    let sx = this.CX + Phaser.Math.Between(-120, 120), sy = this.CY + Phaser.Math.Between(-120, 120);
                    let vis = this.add.image(sx, sy, c.code + '_c').setDisplaySize(30, 30).setDepth(5);
                    let body = this.matter.add.gameObject(vis, { shape: { type: 'circle', radius: 15 }, restitution: 1.1, friction: 0, density: 0.01 });
                    body.setVelocity(Math.cos(Phaser.Math.Between(0, 359)*(Math.PI/180))*2.5, Math.sin(Phaser.Math.Between(0, 359)*(Math.PI/180))*2.5);
                    this.activeBalls.push({ body, data: c });
                });
            }
            update() {
                if (this.isGameOver) return;
                for (let i = this.activeBalls.length - 1; i >= 0; i--) {
                    let ball = this.activeBalls[i];
                    if (Phaser.Math.Distance.Between(ball.body.x, ball.body.y, this.CX, this.CY) > this.RR + 18) {
                        gameState.eliminatedNames.push(ball.data.name.toUpperCase());
                        this.elimBox.setText('ELIMINATED:\n' + [...gameState.eliminatedNames].reverse().map(n => `- ${n.substring(0,12)}`).join('\n'));
                        ball.body.destroy(); this.activeBalls.splice(i, 1); this.aliveText.setText(`ALIVE: ${this.activeBalls.length}`);
                        if (this.activeBalls.length === 1) {
                            this.isGameOver = true; this.cameras.main.flash(800, 255, 215, 0);
                            this.winnerTxt.setText(`🎉 WINNER 🎉\n${this.activeBalls[0].data.name.toUpperCase()}`);
                            this.time.delayedCall(4000, () => this.scene.start('MenuScene'));
                        }
                    }
                }
            }
        }

        const config = {
            type: Phaser.AUTO,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 540, height: 960 },
            physics: { default: 'matter', matter: { debug: false } },
            scene: [MenuScene, GameScene, TourneyScene, BRRoundSelectScene, BRGameScene, TourneyStatsScene, BRFinalScene, HistoryScene, SeasonDetailScene]
        };
        window.phaserGame = new Phaser.Game(config);
    </script>
</body>
</html>
